services:
  medicine-db:
    image: postgres:16
    container_name: medicine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - medicine_pgdata:/var/lib/postgresql/data

volumes:
  medicine_pgdata:
